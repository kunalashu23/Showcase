  <!-- Andaman and Nicobar Islands (UT) -->
  <g id="andaman-nicobar">
    <path class="ut" d="M 650,600 L 660,605 L 665,620 L 660,635 L 650,640 L 640,635 L 637,620 Z"/>
    <path class="ut" d="M 645,660 L 655,665 L 660,680 L 655,695 L 645,700 L 635,695 L 632,680 Z"/>
    <path class="ut" d="M 640,720 L 650,725 L 655,740 L 650,755 L 640,760 L 630,755 L 627,740 Z"/>
