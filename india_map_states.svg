<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <title>Map of India - States and Union Territories</title>
  <defs>
    <style>
      .state {
        fill: #e8f4f8;
        stroke: #2c3e50;
        stroke-width: 1.5;
        transition: fill 0.3s;
      }
      .state:hover {
        fill: #3498db;
        cursor: pointer;
      }
      .ut {
        fill: #fef5e7;
        stroke: #2c3e50;
        stroke-width: 1.5;
      }
      .ut:hover {
        fill: #f39c12;
        cursor: pointer;
      }
      .label {
        font-family: Arial, sans-serif;
        font-size: 10px;
        fill: #2c3e50;
        pointer-events: none;
      }
      .water {
        fill: #d4e6f1;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="#f0f8ff"/>

  <!-- Jammu & Kashmir (UT) -->
  <path id="jammu-kashmir" class="ut" d="M 200,50 L 220,40 L 250,45 L 270,55 L 280,70 L 285,90 L 280,110 L 270,120 L 250,125 L 230,120 L 210,100 L 200,80 Z"/>
  <text class="label" x="245" y="85">J&K</text>

  <!-- Ladakh (UT) -->
  <path id="ladakh" class="ut" d="M 285,90 L 295,80 L 320,75 L 345,80 L 360,95 L 365,115 L 355,130 L 340,135 L 320,130 L 300,125 L 285,115 Z"/>
  <text class="label" x="325" y="110">Ladakh</text>

  <!-- Himachal Pradesh -->
  <path id="himachal-pradesh" class="state" d="M 240,125 L 260,130 L 280,135 L 295,145 L 300,160 L 290,175 L 270,180 L 250,175 L 235,165 L 230,150 Z"/>
  <text class="label" x="260" y="158">HP</text>

