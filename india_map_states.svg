  <text class="label" x="400" y="580">Andhra Pradesh</text>

  <!-- Karnataka -->
  <path id="karnataka" class="state" d="M 260,635 L 290,645 L 320,650 L 350,655 L 370,665 L 380,690 L 380,720 L 370,745 L 350,760 L 320,765 L 290,760 L 265,745 L 250,720 L 245,695 L 250,665 Z"/>
  <text class="label" x="310" y="710">Karnataka</text>

  <!-- Kerala -->
  <path id="kerala" class="state" d="M 265,745 L 285,755 L 295,775 L 300,805 L 295,835 L 285,860 L 270,875 L 250,880 L 235,870 L 228,845 L 230,815 L 240,785 L 250,760 Z"/>
  <text class="label" x="260" y="815">Kerala</text>

  <!-- Tamil Nadu -->
  <path id="tamil-nadu" class="state" d="M 320,765 L 350,770 L 375,780 L 395,800 L 405,825 L 405,850 L 395,875 L 375,890 L 350,895 L 325,890 L 305,880 L 290,865 L 285,840 L 290,815 L 300,790 L 310,775 Z"/>
  <text class="label" x="345" y="835">Tamil Nadu</text>

  <!-- Puducherry (UT) -->
  <circle id="puducherry" class="ut" cx="360" cy="830" r="4"/>
