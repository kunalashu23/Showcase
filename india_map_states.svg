  <!-- Lakshadweep (UT) -->
  <g id="lakshadweep">
    <circle class="ut" cx="120" cy="750" r="3"/>
    <circle class="ut" cx="115" cy="765" r="2.5"/>
    <circle class="ut" cx="125" cy="770" r="2.5"/>
    <circle class="ut" cx="118" cy="780" r="3"/>
    <text class="label" x="90" y="790">Lakshadweep</text>
  </g>

  <!-- Legend -->
  <g id="legend" transform="translate(50, 920)">
    <text class="label" x="0" y="0" font-size="14" font-weight="bold">Legend:</text>
    <rect class="state" x="0" y="10" width="30" height="20"/>
    <text class="label" x="35" y="24">States (28)</text>
    <rect class="ut" x="0" y="40" width="30" height="20"/>
    <text class="label" x="35" y="54">Union Territories (8)</text>
  </g>

  <!-- Title -->
  <text x="400" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">India - States and Union Territories</text>
  <text x="400" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#7f8c8d">28 States and 8 Union Territories (Post-2019)</text>

</svg>