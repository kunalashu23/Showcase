  <path id="assam" class="state" d="M 540,355 L 560,360 L 580,370 L 600,385 L 612,405 L 610,425 L 595,438 L 575,445 L 555,440 L 540,430 L 530,415 L 525,395 L 530,375 Z"/>
  <text class="label" x="560" y="405">Assam</text>

