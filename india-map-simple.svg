<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" style="max-width: 100%; height: auto;">
  <defs>
    <style>
      .india-outline {
        fill: none;
        stroke: oklch(56% 0.12 170);
        stroke-width: 3;
      }
      .coverage-dots {
        fill: oklch(56% 0.12 170);
        opacity: 0.8;
      }
      .coverage-dots:hover {
        opacity: 1;
      }
      .label-text {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        font-size: 14px;
        fill: oklch(20% 0.02 240);
        font-weight: 500;
      }
      .stat-text {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
        font-size: 32px;
        fill: oklch(56% 0.12 170);
        font-weight: 600;
      }
    </style>
  </defs>

  <!-- Simplified India outline -->
  <path class="india-outline" d="M 150,50
    Q 160,45 175,50
    L 200,60
    Q 210,65 215,75
    L 220,95
    Q 222,105 220,115
    L 240,130
    Q 250,135 260,145
    L 280,160
    L 295,180
    Q 298,190 295,200
    L 310,220
    Q 315,235 310,250
    L 315,275
    Q 318,290 315,305
    L 305,330
    L 285,350
    L 275,370
    Q 270,385 260,395
    L 240,415
    L 220,435
    Q 210,445 200,450
    L 185,465
    L 175,485
    Q 170,500 165,510
    L 155,525
    Q 148,535 140,540
    L 125,545
    Q 115,545 110,540
    L 95,530
    Q 88,520 85,505
    L 80,485
    Q 78,470 80,455
    L 85,430
    L 90,405
    Q 92,390 90,375
    L 85,350
    L 75,325
    Q 70,310 70,295
    L 72,270
    Q 75,250 80,235
    L 90,210
    L 100,185
    Q 105,170 110,160
    L 120,140
    L 130,120
    Q 135,105 138,95
    L 142,75
    Q 145,60 150,50 Z"/>

