<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" style="max-width: 100%; height: auto;">
  <defs>
    <style>
      .state-researched {
        fill: oklch(56% 0.12 170);
        stroke: oklch(98% 0.004 240);
        stroke-width: 2;
        opacity: 0.9;
        transition: all 0.3s ease;
      }
      .state-researched:hover {
        opacity: 1;
        filter: brightness(1.15);
        cursor: pointer;
      }
      .state-not-covered {
        fill: oklch(90% 0.006 240);
        stroke: oklch(98% 0.004 240);
        stroke-width: 2;
        opacity: 0.4;
      }
      .label {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
        font-size: 9px;
        fill: oklch(20% 0.02 240);
        font-weight: 500;
        pointer-events: none;
      }
    </style>
  </defs>

